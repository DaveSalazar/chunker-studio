# Configures the "Generate release notes" button on the Releases page.
# Pulls merged PRs since the previous tag and groups them by label.
#
# Apply labels to your PRs (e.g. `feature`, `bug`, `docs`) and they
# show up in the right section automatically. PRs without a relevant
# label fall into "Other changes".

changelog:
  exclude:
    labels:
      - skip-changelog
      - dependencies
    authors:
      - dependabot
  categories:
    - title: ✨ Features
      labels:
        - feature
        - enhancement
    - title: 🐛 Fixes
      labels:
        - bug
        - fix
    - title: 📚 Documentation
      labels:
        - docs
        - documentation
    - title: 🧹 Internal
      labels:
        - chore
        - refactor
    - title: Other changes
      labels:
        - "*"
