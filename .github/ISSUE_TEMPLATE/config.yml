# Disables the "open a blank issue" link, so every issue uses one of
# the templates above. Drop the `blank_issues_enabled: false` line if
# you'd rather keep the escape hatch.
blank_issues_enabled: false
contact_links:
  - name: Support / questions
    url: https://github.com/DaveSalazar/chunker-studio/discussions
    about: For usage questions and general discussion, please use Discussions instead of opening an issue.
